<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Tag</title>
    <link rel="icon" href="data:," />
  </head>
  <body>
    <canvas id="game"></canvas>
    <section class="screen screen-menu" id="start-screen">
      <div class="menu-shell">
        <div class="menu-copy">
          <p class="eyebrow">Arcade Arena</p>
          <h1>Car Tag</h1>
        </div>
        <div class="menu-panel">
          <div class="brand-block">
            <p class="eyebrow">Match Setup</p>
          </div>
          <div class="mode-switch" role="group" aria-label="Game mode">
            <button class="mode-button active" id="mode-solo" type="button">Solo</button>
            <button class="mode-button" id="mode-multiplayer" type="button">Multiplayer</button>
          </div>
          <div class="multiplayer-panel hidden" id="multiplayer-panel">
            <div class="multiplayer-head">
              <div>
                <strong id="multiplayer-title">Online Rooms</strong>
                <span id="multiplayer-subtitle">Live matchmaking</span>
              </div>
              <div class="connection-pill" id="connection-pill">Online</div>
            </div>
            <div class="connection-row">
              <label id="name-field">
                <span>Driver</span>
                <input id="multiplayer-name" type="text" maxlength="18" autocomplete="off" />
              </label>
              <label id="room-code-field">
                <span>Private Code</span>
                <input id="room-code" type="text" maxlength="6" autocomplete="off" autocapitalize="characters" spellcheck="false" />
              </label>
              <button class="secondary-action danger-action" id="connect-server" type="button">Leave Room</button>
            </div>
            <div class="room-actions" id="room-actions">
              <label>
                <span>Access</span>
                <select id="room-visibility">
                  <option value="public" selected>Public</option>
                  <option value="private">Private</option>
                </select>
              </label>
              <button class="secondary-action" id="create-room" type="button">Quick Play</button>
              <button class="secondary-action" id="join-room" type="button">Join Private</button>
              <button class="secondary-action" id="refresh-rooms" type="button">Refresh</button>
            </div>
            <div class="lobby-status" id="lobby-status">Online</div>
            <div class="room-browser" id="room-browser"></div>
            <div class="room-summary hidden" id="room-summary"></div>
            <div class="lobby-list" id="lobby-list"></div>
          </div>
          <div class="menu-grid">
            <label>
              <span>Round Time</span>
              <select id="round-time">
                <option value="60">1:00</option>
                <option value="120" selected>2:00</option>
                <option value="180">3:00</option>
                <option value="300">5:00</option>
              </select>
            </label>
            <label>
              <span>Cars</span>
              <select id="player-count">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
              </select>
            </label>
            <label>
              <span>Arena</span>
              <select id="arena-select">
                <option value="orange" selected>Orange</option>
                <option value="blue">Blue</option>
                <option value="purple">Purple</option>
                <option value="green">Green</option>
              </select>
            </label>
          </div>
          <div class="color-section">
            <span>Car Color</span>
            <div class="color-picker" id="color-picker" aria-label="Car color"></div>
          </div>
          <button class="primary-action" id="start-round" type="button">Start Round</button>
        </div>
      </div>
    </section>

    <section class="screen screen-end hidden" id="end-screen">
      <div class="menu-panel results-panel">
        <p class="eyebrow">Round Complete</p>
        <h1>Results</h1>
        <ol class="results-list" id="results-list"></ol>
        <button class="primary-action" id="play-again" type="button">Play Again</button>
      </div>
    </section>

    <section class="pause-screen hidden" id="pause-screen" aria-modal="true" role="dialog">
      <div class="pause-panel">
        <p class="eyebrow" id="pause-eyebrow">Paused</p>
        <h2 id="pause-title">Game Paused</h2>
        <p id="pause-copy">Solo play is paused.</p>
        <div class="pause-actions">
          <button class="primary-action" id="resume-game" type="button">Resume</button>
          <button class="secondary-action" id="pause-menu" type="button">Menu</button>
          <button class="secondary-action hidden" id="pause-disconnect" type="button">Disconnect</button>
        </div>
      </div>
    </section>

    <div class="hud">
      <div class="dial">
        <span id="speed">000</span>
        <small>mph</small>
      </div>
      <div class="tag-hud">
        <div class="it-banner" id="it-banner">TAG</div>
        <div class="leaderboard" id="leaderboard"></div>
      </div>
      <div class="round-actions">
        <div class="timer" id="round-timer">2:00</div>
        <button class="menu-return" id="menu-return" type="button" aria-label="Back to menu">Menu</button>
      </div>
      <button class="boost-meter" id="boost" type="button" style="--boost-ready: 100%" aria-label="Boost">
        <div class="boost-ring">
          <span id="boost-value"></span>
        </div>
        <small>boost</small>
      </button>
      <button class="jump-button" id="jump-button" type="button" aria-label="Jump">
        <div class="jump-ring">
          <span>↑</span>
        </div>
        <small>jump</small>
      </button>
    </div>
    <div class="countdown hidden" id="countdown" aria-live="polite">
      <span id="countdown-value">3</span>
    </div>
    <div class="touch-controls" aria-hidden="true">
      <div class="joystick" id="joystick">
        <div class="joystick-knob" id="joystick-knob"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

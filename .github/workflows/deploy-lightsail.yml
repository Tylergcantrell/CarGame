name: Deploy CarTag Multiplayer

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/deploy-lightsail.yml"
  workflow_dispatch:

concurrency:
  group: cartag-lightsail-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LIGHTSAIL_HOST: 3.12.211.2
      LIGHTSAIL_USER: deploy
      ARCHIVE_PATH: /tmp/cartag-${{ github.sha }}.tgz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build server bundle
        run: npm run build:server

      - name: Run multiplayer smoke check
        run: npm run check:multiplayer

      - name: Create release archive
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='server/.env.production' \
            --exclude='tmp-*' \
            --exclude='.cache' \
            --exclude='cache' \
            -czf cartag-${{ github.sha }}.tgz \
            package.json \
            package-lock.json \
            server

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/cartag_lightsail
          chmod 600 ~/.ssh/cartag_lightsail
          ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Upload release archive
        run: |
          set -euo pipefail
          scp -i ~/.ssh/cartag_lightsail \
            -o IdentitiesOnly=yes \
            cartag-${{ github.sha }}.tgz \
            "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}:${ARCHIVE_PATH}"

      - name: Deploy on Lightsail
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/cartag_lightsail \
            -o IdentitiesOnly=yes \
            "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}" \
            "sudo -n /usr/local/bin/cartag-deploy $ARCHIVE_PATH"

      - name: Verify remote health
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/cartag_lightsail \
            -o IdentitiesOnly=yes \
            "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}" \
            "curl -fsS http://127.0.0.1:8787/healthz"
